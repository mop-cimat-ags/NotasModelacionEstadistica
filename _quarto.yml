project:
  type: book
  output-dir: _book
  execute-dir: project

lang: es

book:
  title: "Modelacion Estadistica"
  subtitle: "Notas del Curso - Maestria OMP, CIMAT"
  author: "Dr. Sergio M. Nava Munoz, Dr. Magin Zuniga Estrada, Dr. Humberto Martinez Bautista"
  date: today
  date-format: "MMMM YYYY"

  sidebar:
    search: true
    style: "docked"

  repo-url: https://github.com/mop-cimat-ags/NotasModelacionEstadistica
  repo-actions: [edit, issue]

  navbar:
    logo: imagenes/logo-cimat.png
    right:
      - icon: github
        href: https://github.com/mop-cimat-ags/NotasModelacionEstadistica
        aria-label: GitHub

  favicon: imagenes/logo-cimat.png

  page-footer:
    left: "Modelacion Estadistica - Maestria OMP, CIMAT"
    right: "2024 CIMAT - Publicado con Quarto"

  chapters:
    - index.qmd
    - part: "Parte I - Probabilidad, Variables Aleatorias y Distribuciones Muestrales"
      chapters:
        - capitulos/parte1/cap01a-estadistica.qmd
        - capitulos/parte1/cap01b-probabilidad.qmd
        - capitulos/parte1/cap02-distribuciones.qmd
        - capitulos/parte1/cap03-distribucion-conjunta.qmd
        - capitulos/parte1/cap04-inferencia.qmd
    - part: "Parte II - Aplicaciones con Datos Reales"
      chapters:
        - capitulos/parte2/cap05-casas.qmd
        - capitulos/parte2/cap06-autos.qmd
    - referencias.qmd

bibliography: referencias.bib

format:
  html:
    theme: materia
    css: estilos-cimat.css
    toc: true
    toc-depth: 4
    toc-title: "En este capitulo"
    number-sections: true
    code-fold: true
    code-tools: true
    highlight-style: github
    smooth-scroll: true

  pdf:
    documentclass: scrbook
    papersize: letter
    fontsize: 11pt
    geometry: [top=2.5cm, bottom=2.5cm, left=3cm, right=2.5cm]
    toc: true
    number-sections: true
    colorlinks: true
    include-in-header: latex/preamble.tex
    include-before-body: latex/portada.tex
    echo: false

  docx:
    toc: true
    number-sections: true
    include-before-body: latex/portada-docx.md
    echo: false

execute:
  echo: true
  cache: true
  freeze: auto
  warning: false
  message: false

knitr:
  opts_chunk:
    comment: "#>"
    collapse: true
